<h1>Dragon Ball Page</h1>
<hr />

<section class="row">
  <div class="col-12 col-sm-6">
    <h3>Agregar: {{ name() }}</h3>
    <input
      type="text"
      class="form-control"
      placeholder="Nombre"
      [value]="name()"
      (change)="name.set(txtName.value)"
      (input)="name.set(txtName.value)"
      #txtName
    />
    <input
      type="number"
      class="form-control mt-2"
      placeholder="Poder"
      [value]="power()"
      (change)="power.set(+numberPower.value)"
      (input)="power.set(+numberPower.value)"
      #numberPower
    />
    <button (click)="addCharacter()" class="btn btn-primary mt-2">Agregar</button>
  </div>

  <div class="col-12 col-sm-6">
    <h3>Personajes fuertes:</h3>
    <ul class="list-group">
      @for (character of characters(); track character.id; let idx = $index  ) {
        @if(character.power >= 7000) {
          <li>
            <li class="list-group-item">
              <span class="badge bg-primary me-2">{{ idx + 1 }}</span>
              {{ character.name }}
              <strong
                [class.text-danger]="character.power >= 9000"
                [class.text-primary]="character.power < 9000"
                >({{ character.power }})</strong>
            </li>
      } @else {
        <li><strong>Debajo de aquí sólo hay insectos</strong></li>
      }
    }
    </ul>
  </div>

</section>
